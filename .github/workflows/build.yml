name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: nab-macos
          path: target/release/nab

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: nab-windows
          path: target/release/nab.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nab-macos
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: nab-windows
          path: artifacts/windows
      - name: Delete existing latest release
        run: gh release delete latest --yes --repo ${{ github.repository }} 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create release
        run: |
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "Latest Build" \
            --notes "mainブランチの最新ビルド" \
            artifacts/macos/nab \
            artifacts/windows/nab.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
