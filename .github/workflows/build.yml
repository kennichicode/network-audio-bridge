name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: chmod +x target/release/nab launchers/start.command
      - uses: actions/upload-artifact@v4
        with:
          name: nab-macos
          path: |
            target/release/nab
            launchers/start.command

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: nab-windows
          path: |
            target/release/nab.exe
            launchers/start.bat

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nab-macos
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: nab-windows
          path: artifacts/windows
      - run: chmod +x artifacts/macos/nab artifacts/macos/start.command
      - name: Delete existing latest release
        run: |
          gh release delete latest --yes --cleanup-tag --repo ${{ github.repository }} 2>/dev/null || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create release
        run: |
          gh release create latest \
            --repo ${{ github.repository }} \
            --target ${{ github.sha }} \
            --title "Latest Build" \
            --notes "see README" \
            "artifacts/macos/nab#nab" \
            "artifacts/macos/start.command#start.command" \
            "artifacts/windows/nab.exe#nab.exe" \
            "artifacts/windows/start.bat#start.bat"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
